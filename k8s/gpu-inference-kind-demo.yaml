apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpu-inference-kind-demo
  namespace: ai-inference
  labels:
    app: gpu-inference-kind-demo
    workload-type: inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gpu-inference-kind-demo
  template:
    metadata:
      labels:
        app: gpu-inference-kind-demo
        workload-type: inference
    spec:
      priorityClassName: gpu-critical-inference
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: gpu.platform/pool
                    operator: In
                    values:
                      - inference
                  - key: topology.kubernetes.io/zone
                    operator: Exists
      containers:
        - name: demo
          image: busybox:1.36
          command: ["sh", "-c", "sleep 3600"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
              nvidia.com/gpu: "1"
            limits:
              cpu: 200m
              memory: 256Mi
              nvidia.com/gpu: "1"

