apiVersion: apps/v1
kind: Deployment
metadata:
  name: quota-exceed-inference-demo
  namespace: ai-inference
  labels:
    app: quota-exceed-inference-demo
    workload-type: inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quota-exceed-inference-demo
  template:
    metadata:
      labels:
        app: quota-exceed-inference-demo
        workload-type: inference
    spec:
      priorityClassName: gpu-critical-inference
      containers:
        - name: demo
          image: busybox:1.36
          command: ["sh", "-c", "sleep 3600"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
              nvidia.com/gpu: "2"
            limits:
              cpu: 200m
              memory: 256Mi
              nvidia.com/gpu: "2"

