apiVersion: batch/v1
kind: Job
metadata:
  name: gpu-scheduling-kind-demo
  namespace: ai-training
  labels:
    app: gpu-scheduling-kind-demo
    workload-type: training
spec:
  template:
    metadata:
      labels:
        app: gpu-scheduling-kind-demo
        workload-type: training
    spec:
      restartPolicy: Never
      priorityClassName: gpu-training
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: accelerator
                    operator: In
                    values:
                      - nvidia-a100
                      - nvidia-h100
                  - key: gpu.platform/pool
                    operator: In
                    values:
                      - training
      containers:
        - name: demo
          image: busybox:1.36
          command: ["sh", "-c", "sleep 3600"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
              nvidia.com/gpu: "1"
            limits:
              cpu: 200m
              memory: 256Mi
              nvidia.com/gpu: "1"

